# === Шрифты (font-family, font-size) ===
font_family      JetBrainsMono Nerd Font
font_size        12.0

# === Внешний вид и прозрачность (background-opacity, window-decoration) ===
background_opacity 0.7
hide_window_decorations yes

# В Kitty есть крутая фишка: можно добавить немного отступов от краев, 
# чтобы текст не прилипал к рамке окна (в ghostty это было по дефолту)
window_padding_width 4

# === Поведение (copy-on-select, mouse-hide-while-typing) ===
# Копировать текст при выделении мышью
copy_on_select yes
# Прятать курсор мыши сразу при начале печати (значение -1)
mouse_hide_wait -1

# === Переменная TERM ===
# По умолчанию kitty использует 'xterm-kitty', что дает больше фишек.
# Но если ты подключаешься по SSH к старым серверам и они ругаются, 
# раскомментируй строку ниже, как это было у тебя в ghostty:
term xterm-256color

clipboard_control write-clipboard write-primary read-clipboard read-primary


# BEGIN_KITTY_THEME
# Gruvbox Dark
include current-theme.conf
# END_KITTY_THEME

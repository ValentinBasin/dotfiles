[opener]
edit = [{ run = 'nvim "$@"', block = true, desc = "Neovim" }]
pdf = [{ run = 'zathura "$@"', orphan = true, desc = "Zathura" }]
image = [{ run = 'imv "$@"', orphan = true, desc = "imv" }]

[open]
rules = [
  { name = "*/", use = [
    "edit",
    "pdf",
    "reveal",
    "open",
  ] },
  { mime = "text/*", use = [
    "edit",
  ] },
  { mime = "application/json", use = [
    "edit",
  ] },
  { mime = "application/pdf", use = [
    "pdf",
  ] },
  { mime = "image/*", use = [
    "image",
  ] },
  { mime = "video/*", use = [
    "video",
  ] },
  { mime = "*", use = [
    "open",
  ] },
]
